{% extends "layout.html" %}
{% block title %}Create new damage{% endblock %}

{% block content %}

{% with messages = get_flashed_messages() %}
{% if messages %}
    <div style="color: red;">
        {{ messages[0] }}
    </div>
{% endif %}
{% endwith %}

<h1 class="title is-1">Declare a new damage</h1>
<hr>
<form method="post" action="{{ url_for('main.damage.new') }}">
    <div class="field">
        <label class="label">Description</label>
        <div class="control">
            <textarea class="textarea" name="description" placeholder="Your description here..."></textarea>
        </div>
    </div>
    <div class="grid">
        <div class="cell field">
            <label class="label">Latitude</label>
            <div class="control">
                <input class="input" type="number" step="0.01" name="latitude" placeholder="0.0">
            </div>
        </div>
        <div class="cell field">
            <label class="label">Longitude</label>
            <div class="control">
                <input class="input" type="number" step="0.01" name="longitude" placeholder="0.0">
            </div>
        </div>
    </div>
    <div class="field">
        <label class="label">Date</label>
        <div class="control">
            <input type="date" name="date" value="2024-11-15"/>
        </div>
    </div>
    <button class="button is-primary" type="submit">Declare damage</button>
</form>

{% endblock %}
