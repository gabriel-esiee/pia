{% extends "layout.html" %}
{% block title %}Login{% endblock %}

{% block content %}

<h1 class="title is-1">Login to your account</h1>
<hr>
{% with messages = get_flashed_messages() %}
{% if messages %}
    <div class="notification is-danger">
        <button class="delete"></button>
        {{ messages[0] }}
    </div>
{% endif %}
{% endwith %}
<form method="post" action="{{ url_for('main.user.login') }}">
    <div class="field">
        <label class="label" for="email">Email</label>
        <div class="control has-icons-left has-icons-right">
            <input class="input" type="email" name="email" placeholder="your@email.com" value="">
            <span class="icon is-small is-left">
                <i class="fas fa-envelope"></i>
            </span>
        </div>
    </div>
    <div class="field">
        <label class="label" for="password">Password</label>
        <div class="control has-icons-left has-icons-right">
            <input class="input" type="password" name="password" placeholder="●●●●●" value="">
            <span class="icon is-small is-left">
                <i class="fas fa-lock"></i>
            </span>
        </div>
    </div>
    <div class="buttons">
        <button class="button is-primary" type="submit">Login</button>
        <a href="{{ url_for("main.user.signup") }}" class="button is-link is-light">Create an account</a>
    </div>
</form>

{% endblock %}
